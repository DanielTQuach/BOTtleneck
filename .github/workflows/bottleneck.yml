name: BOTtleneck — Performance Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  perf-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: BOTtleneck
        uses: DanielTQuach/BOTtleneck@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          max_files: "10"
